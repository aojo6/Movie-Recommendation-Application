<div class="form-container">
    <div class="form-header">
        <h4>{{mode}} Movie DB Form</h4>
    </div>
    
    <div class="action-buttons">
        <button mat-menu-item routerLink="editStudent/:_id">EDIT</button>
        <button mat-button color="warn" (click)="onDelete(student._id)">DELETE</button>
        
    </div>

    <div class="action-buttons">
        <app-navigation-menu></app-navigation-menu>
    </div>

    <form (ngSubmit)="onSubmit()" [formGroup]="studentForm">
        <div class="form-row">
            <mat-form-field class="form-field">
                <input matInput placeholder="Movie Name" id="movie_name" formControlName="movie_Name" name="movie_name">
            </mat-form-field>

            <mat-form-field class="form-field">
                <input matInput placeholder="Genre" id="genre" formControlName="genres" name="genre">
            </mat-form-field>
        </div>

        <mat-form-field class="form-field full-width">
            <input matInput placeholder="Release Year" id="year" formControlName="Year" name="year">
        </mat-form-field>

        <mat-form-field class="form-field full-width">
            <input matInput placeholder="Director" id="director" formControlName="author" name="director">
        </mat-form-field>

        <mat-form-field class="form-field full-width">
            <input matInput placeholder="Ratings & Review" id="rating_review" formControlName="Ratings" name="rating_review">
        </mat-form-field>
    
        <div class="submit-button">
            <button type="submit" mat-raised-button color="primary">Submit</button>
        </div>
    </form>
</div>
